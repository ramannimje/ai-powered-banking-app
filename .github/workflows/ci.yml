name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  # ─── Backend Tests ─────────────────────────────────────────
  backend-test:
    name: Backend (Python ${{ env.PYTHON_VERSION }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: aisb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linting (ruff)
        run: pip install ruff && ruff check .

      - name: Run type check (mypy)
        run: pip install mypy && mypy core --ignore-missing-imports

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/aisb_test
          SYNC_DATABASE_URL: postgresql://test:test@localhost:5432/aisb_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: amqp://guest:guest@localhost:5672//
          SECRET_KEY: test-secret-key-12345
          GOOGLE_CLIENT_ID: ""
          GOOGLE_CLIENT_SECRET: ""
          OPENAI_API_KEY: ""
        run: pip install pytest pytest-asyncio httpx && pytest tests/ -v --tb=short

  # ─── Frontend Build ─────────────────────────────────────────
  frontend-build:
    name: Frontend (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npx next lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build

  # ─── Docker Build ───────────────────────────────────────────
  docker-build:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: aisb-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: aisb-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Integration Test ───────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: aisb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: pip install httpx uvicorn pytest pytest-asyncio

      - name: Start API in background
        run: |
          cd backend
          pip install -r requirements.txt
          uvicorn core.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Health check
        run: |
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:8000/ || exit 1

      - name: Run smoke tests
        run: |
          curl -s http://localhost:8000/ | grep -q "AI Smart Bank"
          curl -s http://localhost:8000/health | grep -q "ok"

  # ─── Notify on Main ────────────────────────────────────────
  notify-on-main:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, docker-build, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Summary
        run: |
          echo "## ✅ All checks passed for AI Smart Bank"
          echo "- Backend tests: passed"
          echo "- Frontend build: passed"
          echo "- Docker images: built"
          echo "- Integration: passed"
          echo ""
          echo "Ready to deploy."
