version: "3.9"

services:
  # ─── Database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aisb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aisb
      POSTGRES_PASSWORD: aisb_secret
      POSTGRES_DB: aisb_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisb -d aisb_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aisb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: aisb-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: aisb
      RABBITMQ_DEFAULT_PASS: aisb_secret
    ports:
      - "5672:5672"
      - "15672:15672"  # management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Gateway (FastAPI) ──────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aisb-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aisb:aisb_secret@postgres:5432/aisb_db
      SYNC_DATABASE_URL: postgresql://aisb:aisb_secret@postgres:5432/aisb_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://aisb:aisb_secret@rabbitmq:5672//
      SECRET_KEY: ${SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ─── Celery Worker ──────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aisb-celery
    restart: unless-stopped
    command: celery -A workers.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aisb:aisb_secret@postgres:5432/aisb_db
      SYNC_DATABASE_URL: postgresql://aisb:aisb_secret@postgres:5432/aisb_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://aisb:aisb_secret@rabbitmq:5672//
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ─── pgAdmin (Optional DB UI) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aisb-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aisb.local
      PGADMIN_DEFAULT_PASSWORD: admin_secret
    ports:
      - "5050:80"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: